        <div class="boot-visual" aria-hidden="true">
          <div class="boot-orbit boot-orbit--a"></div>
          <div class="boot-orbit boot-orbit--b"></div>
          <div class="boot-orbit boot-orbit--c"></div>
          <div class="boot-hub"></div>
        </div>
        <p class="boot-brand">WoodenMax</p>
        <p class="boot-typewriter" aria-label="Designer Engine loading">
          <span id="boot-tw-text"></span><span class="boot-tw-caret" aria-hidden="true">▍</span>
        </p>
        <p id="boot-pct" class="boot-pct" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">0%</p>
        <div class="boot-bar-wrap" aria-hidden="true">
          <div id="boot-bar-fill" class="boot-bar-fill"></div>
        </div>
        <p class="boot-sub">Starting designer engine &mdash; PDF quotes &amp; BOM. <span lang="hi">Bas ek lamha.</span></p>
      </div>
    </div>
    <script>
      (function () {
        var pctEl = document.getElementById('boot-pct');
        var barEl = document.getElementById('boot-bar-fill');
        var twEl = document.getElementById('boot-tw-text');
        if (!pctEl || !barEl) return;

        var line = 'Designer Engine';
        var ti = 0;
        function typeTick() {
          if (!twEl) return;
          if (ti <= line.length) {
            twEl.textContent = line.slice(0, ti);
            ti++;
            window.setTimeout(typeTick, 42 + Math.random() * 38);
          }
        }
        window.setTimeout(typeTick, 280);

        var pct = 2;
        function paint(v) {
          var n = Math.min(100, Math.max(0, Math.round(v)));
          pctEl.textContent = n + '%';
          pctEl.setAttribute('aria-valuenow', String(n));
          barEl.style.width = n + '%';
        }
        paint(pct);
        var tick = window.setInterval(function () {
          var cap = document.readyState === 'complete' ? 100 : 92;
          var room = cap - pct;
          if (room <= 0) return;
          pct += Math.max(0.4, room * (0.05 + Math.random() * 0.08));
          paint(pct);
        }, 280);
        function finish() {
          window.clearInterval(tick);
          paint(100);
          if (twEl && ti <= line.length) {
            twEl.textContent = line;
          }
        }
        window.addEventListener('load', finish);
        if (document.readyState === 'complete') finish();
      })();
    </script>
