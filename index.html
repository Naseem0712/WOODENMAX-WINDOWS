  <body class="bg-slate-900 text-slate-200">
    <div id="root">
      <div id="app-boot" role="status" aria-live="polite" aria-busy="true" aria-label="Loading WoodenMax Designer">
        <div class="boot-card">
          <div class="boot-logo-wrap" id="boot-logo-wrap">
            <img class="boot-logo" src="/logo.jpg" alt="WoodenMax" width="200" height="48" decoding="async" />
            <p class="boot-logo-fallback" aria-hidden="true">WoodenMax</p>
          </div>
          <p class="boot-tagline">Window &amp; Railing Designer</p>
          <p class="boot-typewriter" aria-label="Loading status">
            <span id="boot-tw-text"></span><span class="boot-tw-caret" aria-hidden="true">▍</span>
          </p>
          <div class="boot-pct-row">
            <p id="boot-pct" class="boot-pct" aria-valuemin="0" aria-valuemax="100" aria-valuenow="0">0%</p>
            <span class="boot-pct-label">ready</span>
          </div>
          <div class="boot-bar-wrap" aria-hidden="true">
            <div id="boot-bar-fill" class="boot-bar-fill"></div>
          </div>
          <p class="boot-sub" id="boot-status">
            <strong>Designer engine</strong> &mdash; quotations, PDF &amp; BOM. <span lang="hi">Bas ek lamha.</span>
          </p>
          <div class="boot-chips" aria-hidden="true">
            <span class="boot-chip">Windows</span>
            <span class="boot-chip">Railing</span>
            <span class="boot-chip">PDF Quote</span>
            <span class="boot-chip">BOM</span>
          </div>
        </div>
      </div>
    </div>
    <script>
      (function () {
        var pctEl = document.getElementById('boot-pct');
        var barEl = document.getElementById('boot-bar-fill');
        var twEl = document.getElementById('boot-tw-text');
        var statusEl = document.getElementById('boot-status');
        var logoWrap = document.getElementById('boot-logo-wrap');
        var logoImg = logoWrap && logoWrap.querySelector('.boot-logo');
        if (!pctEl || !barEl) return;

        if (logoImg) {
          logoImg.addEventListener('error', function () {
            if (logoWrap) logoWrap.classList.add('logo-missing');
          });
        }

        var lines = ['Loading modules…', 'Preparing canvas…', 'Rates & quotation engine…'];
        var lineIdx = 0;
        var charIdx = 0;
        function typeTick() {
          if (!twEl) return;
          var line = lines[lineIdx];
          if (charIdx <= line.length) {
            twEl.textContent = line.slice(0, charIdx);
            charIdx++;
            window.setTimeout(typeTick, 36 + Math.random() * 32);
          } else if (lineIdx < lines.length - 1) {
            window.setTimeout(function () {
              lineIdx++;
              charIdx = 0;
              typeTick();
            }, 520);
          }
        }
        window.setTimeout(typeTick, 200);

        var statusSteps = [
          '<strong>Designer engine</strong> &mdash; quotations, PDF &amp; BOM.',
          '<strong>Profile optimiser</strong> &amp; material lists.',
          '<strong>Almost ready</strong> &mdash; <span lang="hi">bas ek lamha.</span>',
        ];
        var pct = 3;
        function paint(v) {
          var n = Math.min(100, Math.max(0, Math.round(v)));
          pctEl.textContent = n + '%';
          pctEl.setAttribute('aria-valuenow', String(n));
          barEl.style.width = n + '%';
          if (statusEl) {
            var si = n < 40 ? 0 : n < 78 ? 1 : 2;
            statusEl.innerHTML = statusSteps[si];
          }
        }
        paint(pct);
        var tick = window.setInterval(function () {
          var cap = document.readyState === 'complete' ? 100 : 94;
          var room = cap - pct;
          if (room <= 0) return;
          pct += Math.max(0.5, room * (0.06 + Math.random() * 0.07));
          paint(pct);
        }, 260);
        function finish() {
          window.clearInterval(tick);
          paint(100);
          if (twEl) twEl.textContent = 'Ready';
          if (statusEl) {
            statusEl.innerHTML = '<strong>Welcome</strong> &mdash; design, quote &amp; export.';
          }
        }
        window.addEventListener('load', finish);
        if (document.readyState === 'complete') finish();
      })();
    </script>
