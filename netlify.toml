# Netlify: ensure crawler files are served as static assets (not SPA HTML) + correct MIME.
# Build output must include public/* → dist/ (Vite default).

[build]
  command = "npm run build"
  publish = "dist"

[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Content-Type = "application/xml; charset=utf-8"
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Content-Type = "text/plain; charset=utf-8"
